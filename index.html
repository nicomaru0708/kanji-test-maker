<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字テストメーカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f6f3;--bg3:#efecea;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --border:#e2dfd9;--border2:#c8c4be;
  --blue-bg:#e6f0fb;--blue-text:#1a4f8a;
  --green-bg:#e8f5e2;--green-text:#2a5e14;
  --amber:#f0a500;--amber-light:#fef3d8;
  --r:10px;--rs:7px;
}
html,body{height:100%;font-family:"Hiragino Kaku Gothic Pro","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg2);color:var(--text);font-size:15px}
.app{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);height:100vh}
.left{display:flex;flex-direction:column;background:var(--bg);border-right:1px solid var(--border);overflow:hidden}
.right{display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
.ph{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0}
.ph h1{font-size:15px;font-weight:600;color:var(--text)}
.ph-hint{font-size:12px;color:var(--text3)}
.sb{padding:9px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--bg);flex-shrink:0}
.sb input[type=text]{border:1px solid var(--border2);border-radius:var(--rs);padding:5px 9px;font-size:13px;background:var(--bg);color:var(--text);width:150px;font-family:inherit}
.sb input[type=text]:focus{outline:none;border-color:#888}
.cklabel{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.cklabel input{width:14px;height:14px;cursor:pointer;accent-color:var(--amber)}
.pbtn{margin-left:auto;padding:7px 16px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);cursor:pointer;font-size:13px;font-weight:600;color:var(--text);font-family:inherit;transition:background .15s}
.pbtn:hover{background:var(--bg3)}
.pane{flex:1;overflow-y:auto;padding:16px 20px}

.ac{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px}
.ar{display:flex;gap:8px;align-items:flex-end}
.ar textarea{flex:1;border:1px solid var(--border2);border-radius:var(--rs);padding:7px 10px;font-size:14px;resize:none;height:40px;overflow:hidden;background:var(--bg);color:var(--text);font-family:inherit;line-height:1.6}
.ar textarea:focus{outline:none;border-color:#888}
.fl{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:4px}
.abtn{padding:0 16px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);cursor:pointer;font-size:13px;font-weight:600;color:var(--text);font-family:inherit;white-space:nowrap;transition:background .15s;height:40px}
.abtn:hover{background:var(--bg3)}

.qi{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.qm{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.qnum-lbl{font-size:12px;color:var(--text3);font-weight:600}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.yb{background:var(--blue-bg);color:var(--blue-text)}
.kb{background:var(--green-bg);color:var(--green-text)}
.bc{font-size:11px;background:var(--amber-light);color:#7a4800;padding:2px 7px;border-radius:20px}
.dbtn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 4px}
.dbtn:hover{color:var(--text)}
.sent{font-size:18px;line-height:2.8;letter-spacing:.02em;margin-bottom:8px}
.tok{cursor:pointer;padding:1px 3px;border-radius:4px;transition:background .12s;position:relative;display:inline-block}
.tok:hover{background:var(--bg3)}
.tok.ty{background:var(--blue-bg);color:var(--blue-text)}
.tok.tk{background:var(--green-bg);color:var(--green-text)}
.tok .furi{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:10px;white-space:nowrap;pointer-events:none;color:var(--green-text)}
.popup{position:absolute;z-index:300;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);box-shadow:0 4px 16px rgba(0,0,0,.13);padding:6px;display:flex;gap:4px;top:calc(100% + 6px);left:50%;transform:translateX(-50%);white-space:nowrap}
.popup button{padding:5px 11px;border:1px solid var(--border2);border-radius:5px;cursor:pointer;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);transition:background .1s}
.popup button:hover{background:var(--bg2)}
.popup .py{background:var(--blue-bg);color:var(--blue-text);border-color:#378add}
.popup .pk{background:var(--green-bg);color:var(--green-text);border-color:#639922}
.ba{display:flex;flex-wrap:wrap;gap:7px;padding-top:10px;border-top:1px solid var(--border)}
.be{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:5px 9px}
.bk{font-size:14px;font-weight:600}
.bky{color:var(--blue-text)}
.bkk{color:var(--green-text)}
.barr{font-size:11px;color:var(--text3)}
.bi{border:none;border-bottom:1px solid var(--border2);background:transparent;font-size:13px;color:var(--text);width:90px;outline:none;padding:2px 0;font-family:inherit}
.bi:focus{border-bottom-color:#666}
.bi::placeholder{color:var(--text3)}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px;line-height:2}

.ps{flex:1;overflow-y:auto;padding:20px}
.pp{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;min-height:400px;font-family:"Hiragino Mincho Pro","Yu Mincho",serif}
.pe{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;line-height:2.2}

/* print preview */
.p-hdr{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #222;padding-bottom:10px;margin-bottom:20px}
.p-ttl{font-size:20px;font-weight:bold;color:#111;font-family:"Hiragino Kaku Gothic Pro","Yu Gothic",sans-serif}
.p-sub{font-size:11px;color:#888;margin-top:4px;font-family:sans-serif}
.p-meta{display:flex;flex-direction:column;gap:5px;align-items:flex-end;font-family:sans-serif}
.p-ml{display:flex;align-items:center;gap:6px;font-size:12px;color:#444}
.p-meta-ul{display:inline-block;width:110px;border-bottom:1px solid #555}
.p-sp{border:1px solid #444;padding:3px 14px;font-size:12px;color:#111}
.p-ins{font-size:12px;color:#555;margin-bottom:18px;font-family:sans-serif;line-height:2}
.p-qblock{margin-bottom:32px}
.p-qline{font-size:16px;color:#111;line-height:2;font-family:"Hiragino Mincho Pro","Yu Mincho",serif;margin-bottom:10px}
.p-qn{font-size:13px;color:#444;font-family:sans-serif;margin-right:6px}
.p-num{display:inline-block;background:#333;color:#fff;font-size:11px;font-family:sans-serif;border-radius:3px;padding:0 4px;line-height:1.6;vertical-align:middle;margin:0 1px}
.p-ans-row{display:flex;flex-wrap:wrap;gap:0;border:1px solid #bbb}
.p-ans-cell{flex:1;min-width:120px;border-right:1px solid #bbb;padding:6px 10px}
.p-ans-cell:last-child{border-right:none}
.p-ans-label{font-size:11px;color:#666;font-family:sans-serif;margin-bottom:4px}
.p-ans-line{border-bottom:1px solid #999;height:38px;width:100%}
.p-key{border-top:1px dashed #ccc;margin-top:20px;padding-top:10px;font-size:11px;color:#666;line-height:2;font-family:sans-serif}

@media print{
  .left,.ph,.sb{display:none!important}
  .app{display:block!important;height:auto!important}
  .right{display:block!important;height:auto!important}
  .ps{overflow:visible!important;padding:0!important}
  .pp{border:none!important;border-radius:0!important;padding:12mm 18mm!important;min-height:0!important}
}
@media(max-width:700px){
  .app{grid-template-columns:1fr;height:auto;min-height:100vh}
  .left,.right{height:50vh}
}
</style>
</head>
<body>
<div class="app">
  <div class="left">
    <div class="ph">
      <h1>漢字テストメーカー</h1>
      <span class="ph-hint">語をクリック → 読み／書きを選択</span>
    </div>
    <div class="sb">
      <div>
        <div class="fl">タイトル</div>
        <input type="text" id="title-inp" value="漢字テスト">
      </div>
      <label class="cklabel"><input type="checkbox" id="ck-name" checked>名前欄</label>
      <label class="cklabel"><input type="checkbox" id="ck-date" checked>日付欄</label>
      <label class="cklabel"><input type="checkbox" id="ck-score" checked>点数欄</label>
      <button class="pbtn" onclick="window.print()">🖨 印刷 / PDF</button>
    </div>
    <div class="pane">
      <div class="ac">
        <div class="fl">例文を入力</div>
        <div class="ar">
          <textarea id="new-sent" placeholder="例：まいあさ、学校へ行く前に新聞を読みます。"></textarea>
          <button class="abtn" onclick="addQ()">追加</button>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">
          Enterキーでも追加。語をクリック →
          <span style="background:var(--blue-bg);color:var(--blue-text);padding:1px 6px;border-radius:3px">読み</span>（漢字で入力）か
          <span style="background:var(--green-bg);color:var(--green-text);padding:1px 6px;border-radius:3px">書き</span>（ひらがなで入力）を選択
        </div>
      </div>
      <div id="qlist"></div>
    </div>
  </div>

  <div class="right">
    <div class="ph">
      <h1>プレビュー</h1>
      <span class="ph-hint">リアルタイム更新</span>
    </div>
    <div class="ps">
      <div class="pp" id="preview">
        <div class="pe">左側で例文を入力し<br>語をクリックして問題箇所を指定すると<br>ここにプレビューが表示されます</div>
      </div>
    </div>
  </div>
</div>

<script>
// 文章をセグメントに分割（語単位でクリック可能に）
function segmentize(text){
  const segs=[];
  const re=/([一-龯々〇ぁ-んァ-ヶa-zA-Zａ-ｚＡ-Ｚ０-９0-9]+|[^\s])/gu;
  let m,last=0,id=0;
  while((m=re.exec(text))!==null){
    if(m.index>last) segs.push({text:text.slice(last,m.index),id:id++,clickable:false});
    segs.push({text:m[0],id:id++,clickable:true});
    last=m.index+m[0].length;
  }
  if(last<text.length) segs.push({text:text.slice(last),id:id++,clickable:false});
  return segs;
}

let questions=[
  {id:1,sentence:'まいあさ、学校へ行く前に新聞を読みます。',tokenTypes:{},answers:{}},
  {id:2,sentence:'きのうの夜、友だちと電話で話しました。',tokenTypes:{},answers:{}}
];
let nextId=3;
let openPopup=null;

const ta=document.getElementById('new-sent');
ta.addEventListener('input',function(){
  this.style.height='40px';
  this.style.height=Math.max(this.scrollHeight,40)+'px';
});

function addQ(){
  const s=ta.value.trim();
  if(!s)return;
  questions.push({id:nextId++,sentence:s,tokenTypes:{},answers:{}});
  ta.value='';ta.style.height='40px';
  render();
}
ta.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addQ();}
});

document.addEventListener('click',e=>{
  if(openPopup&&!e.target.closest('.popup')&&!e.target.closest('.tok')){
    openPopup=null;renderList();
  }
});

function openTokPopup(qid,tid,e){
  e.stopPropagation();
  openPopup=(openPopup&&openPopup.qid===qid&&openPopup.tid===tid)?null:{qid,tid};
  renderList();
}

function setTokType(qid,tid,type,e){
  e.stopPropagation();
  const q=questions.find(x=>x.id===qid);if(!q)return;
  if(q.tokenTypes[tid]===type){delete q.tokenTypes[tid];delete q.answers[tid];}
  else{q.tokenTypes[tid]=type;if(q.answers[tid]===undefined)q.answers[tid]='';}
  openPopup=null;render();
}

function setAns(qid,tid,val){
  const q=questions.find(x=>x.id===qid);
  if(q)q.answers[tid]=val;
  renderPreview();
}

function removeQ(qid){questions=questions.filter(x=>x.id!==qid);render();}
function render(){renderList();renderPreview();}

function renderList(){
  const el=document.getElementById('qlist');
  if(!questions.length){el.innerHTML='<div class="empty">例文を入力して追加してください</div>';return;}
  el.innerHTML=questions.map((q,qi)=>{
    const segs=segmentize(q.sentence);
    const sel=segs.filter(s=>s.clickable&&q.tokenTypes[s.id]);
    const yN=sel.filter(s=>q.tokenTypes[s.id]==='yomi').length;
    const kN=sel.filter(s=>q.tokenTypes[s.id]==='kaki').length;

    const sentHtml=segs.map(seg=>{
      if(!seg.clickable)return`<span>${seg.text}</span>`;
      const tt=q.tokenTypes[seg.id];
      const cls=tt==='yomi'?'tok ty':tt==='kaki'?'tok tk':'tok';
      const isOpen=openPopup&&openPopup.qid===q.id&&openPopup.tid===seg.id;
      const furi=(tt==='kaki'&&q.answers[seg.id])?`<span class="furi">${q.answers[seg.id]}</span>`:'';
      const safeText=seg.text.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const popup=isOpen?`<div class="popup" onclick="event.stopPropagation()">
        <button class="${tt==='yomi'?'py':''}" onclick="setTokType(${q.id},${seg.id},'yomi',event)">読み</button>
        <button class="${tt==='kaki'?'pk':''}" onclick="setTokType(${q.id},${seg.id},'kaki',event)">書き</button>
        ${tt?`<button onclick="setTokType(${q.id},${seg.id},null,event)" style="color:#c00">解除</button>`:''}
      </div>`:'';
      return`<span class="${cls}" style="position:relative" onclick="openTokPopup(${q.id},${seg.id},event)">${furi}${seg.text}${popup}</span>`;
    }).join('');

    const blanksHtml=sel.length?`<div class="ba">${
      sel.map(seg=>{
        const tt=q.tokenTypes[seg.id];
        return`<div class="be">
          <span class="bk ${tt==='yomi'?'bky':'bkk'}">${seg.text}</span>
          <span class="barr">${tt==='yomi'?'→ よみ（ひらがな）':'→ ふりがな（ひらがな）'}</span>
          <input class="bi" value="${(q.answers[seg.id]||'').replace(/"/g,'&quot;')}"
            placeholder="ひらがな"
            oninput="setAns(${q.id},${seg.id},this.value)">
        </div>`;
      }).join('')
    }</div>`:'';

    const badges=[];
    if(yN)badges.push(`<span class="badge yb">読み×${yN}</span>`);
    if(kN)badges.push(`<span class="badge kb">書き×${kN}</span>`);

    return`<div class="qi">
      <div class="qm">
        <span class="qnum-lbl">問${qi+1}</span>${badges.join('')}
        ${sel.length?`<span class="bc">空欄 ${sel.length}か所</span>`:''}
        <button class="dbtn" onclick="removeQ(${q.id})">✕</button>
      </div>
      <div class="sent">${sentHtml}</div>
      ${blanksHtml}
    </div>`;
  }).join('');
}

function renderPreview(){
  const title=document.getElementById('title-inp').value||'漢字テスト';
  const showName=document.getElementById('ck-name').checked;
  const showDate=document.getElementById('ck-date').checked;
  const showScore=document.getElementById('ck-score').checked;
  const activeQs=questions.filter(q=>Object.keys(q.tokenTypes).length>0);
  const totalBlanks=questions.reduce((s,q)=>s+Object.keys(q.tokenTypes).length,0);

  if(!activeQs.length){
    document.getElementById('preview').innerHTML='<div class="pe">左側で例文を入力し<br>語をクリックして問題箇所を指定すると<br>ここにプレビューが表示されます</div>';
    return;
  }

  const metaHtml=`
    ${showName?'<div class="p-ml">名前：<span class="p-meta-ul"></span></div>':''}
    ${showDate?'<div class="p-ml">日付：<span class="p-meta-ul"></span></div>':''}
    ${showScore?`<div class="p-ml"><span class="p-sp">&emsp;&emsp;／${totalBlanks}点</span></div>`:''}`;

  let globalN=0;
  const allBlanks=[];

  const qsHtml=activeQs.map((q,qi)=>{
    const segs=segmentize(q.sentence);
    const qBlanks=[];

    const sentHtml=segs.map(seg=>{
      if(!seg.clickable||!q.tokenTypes[seg.id])return seg.text;
      const tt=q.tokenTypes[seg.id];
      globalN++;
      const n=globalN;
      const ans=q.answers[seg.id]||'';
      qBlanks.push({n,text:seg.text,ans,type:tt});
      allBlanks.push({n,text:seg.text,ans,type:tt});

      if(tt==='yomi'){
        return`<span class="p-num">${n}</span>${seg.text}`;
      } else {
        const furi=ans||seg.text;
        return`<span class="p-num">${n}</span>${furi}`;
      }
    }).join('');

    const ansRowHtml=qBlanks.length?`<div class="p-ans-row">${
      qBlanks.map(b=>`<div class="p-ans-cell">
        <div class="p-ans-label">${b.n}. ${b.type==='yomi'?`${b.text}の読み方`:` ${b.ans||b.text}を漢字で`}</div>
        <div class="p-ans-line"></div>
      </div>`).join('')
    }</div>`:'' ;

    return`<div class="p-qblock">
      <div class="p-qline"><span class="p-qn">${qi+1}.</span>${sentHtml}</div>
      ${ansRowHtml}
    </div>`;
  }).join('');

  const keyHtml=allBlanks.length?`<div class="p-key"><strong>答え合わせ：</strong> ${
    allBlanks.map(b=>`${b.n}.【${b.type==='yomi'?`${b.text}→${b.ans||'?'}`:`${b.ans||'?'}→${b.text}`}】`).join('　')
  }</div>`:'';

  const hasYomi=allBlanks.some(b=>b.type==='yomi');
  const hasKaki=allBlanks.some(b=>b.type==='kaki');
  let inst='';
  if(hasYomi&&hasKaki)inst='番号のついた語について、読みはひらがなで、書きは漢字で解答欄に書きなさい。';
  else if(hasYomi)inst='番号のついた漢字の読み方をひらがなで解答欄に書きなさい。';
  else inst='番号のついたひらがなを漢字に直して解答欄に書きなさい。';

  document.getElementById('preview').innerHTML=`
    <div class="p-hdr">
      <div><div class="p-ttl">${title}</div><div class="p-sub">（&emsp;&emsp;）年（&emsp;&emsp;）組</div></div>
      <div class="p-meta">${metaHtml}</div>
    </div>
    <div class="p-ins">${inst}</div>
    ${qsHtml}
    ${keyHtml}`;
}

['title-inp','ck-name','ck-date','ck-score'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input',renderPreview);
  el.addEventListener('change',renderPreview);
});

render();
</script>
</body>
</html>
