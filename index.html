<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字テストメーカー（印刷対応）</title>

<!-- Kuromoji -->

<script src="https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dist/kuromoji.js"></script>

<style>
body{font-family:sans-serif;padding:20px}
textarea{width:100%}
.tok{cursor:pointer;padding:2px 4px;border-radius:4px}
.tok.ty{background:#e6f0fb}
.tok.tk{background:#e8f5e2}

#preview{margin-top:20px;border-top:1px solid #ccc;padding-top:20px}

.p-num{background:#333;color:#fff;font-size:11px;padding:1px 4px;border-radius:3px;margin:0 2px}

@media print{
  textarea,button,#answers{display:none}
}
</style>

</head>

<body>

<h2>漢字テストメーカー</h2>

<textarea id="input" rows="2">まいあさ、学校へ行く前に新聞を読みます。</textarea>

<br><br> <button onclick="analyze()">解析</button> <button onclick="window.print()">印刷</button>

<hr>

<div id="sentence"></div>

<hr>

<h3>問題一覧</h3>
<div id="answers"></div>

<div id="preview"></div>

<script>

// ===== Kuromoji 初期化 =====
let tokenizer = null;

kuromoji.builder({
  dicPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/"
}).build(function (err, _tokenizer) {
  tokenizer = _tokenizer;
  analyze();
});

// ===== ひらがな変換 =====
function toHiragana(katakana){
  if(!katakana) return "";
  return katakana.replace(/[\u30a1-\u30f6]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) - 0x60)
  );
}

// ===== 状態 =====
let tokens = [];
let types = {};
let answers = {};

// ===== 解析 =====
function analyze(){
  const text = document.getElementById("input").value;
  tokens = tokenizer.tokenize(text);
  types = {};
  answers = {};
  render();
}

// ===== 描画 =====
function render(){
  const sentEl = document.getElementById("sentence");
  const ansEl = document.getElementById("answers");

  // クリック用表示
  sentEl.innerHTML = tokens.map((t,i)=>{
    if(t.pos === "記号") return t.surface_form;

    const type = types[i];
    const cls = type === "yomi" ? "tok ty" :
                type === "kaki" ? "tok tk" : "tok";

    return `<span class="${cls}" onclick="toggle(${i})">${t.surface_form}</span>`;
  }).join("");

  // 問題一覧
  ansEl.innerHTML = Object.keys(types).map(i=>{
    const t = tokens[i];
    const type = types[i];
    const ans = answers[i];

    return `<div>
      ${type==="yomi"
        ? `${t.surface_form} → ${ans}`
        : `${toHiragana(t.reading)} → ${ans}`}
    </div>`;
  }).join("");

  renderPreview();
}

// ===== トグル =====
function toggle(i){
  const t = tokens[i];
  if(t.pos === "記号") return;

  if(!types[i]){
    types[i] = "yomi";
    answers[i] = toHiragana(t.reading);

  } else if(types[i] === "yomi"){
    types[i] = "kaki";
    answers[i] = t.surface_form;

  } else {
    delete types[i];
    delete answers[i];
  }

  render();
}

// ===== 印刷プレビュー =====
function renderPreview(){
  const el = document.getElementById("preview");

  let num = 0;

  const text = tokens.map((t,i)=>{
    if(!types[i]) return t.surface_form;

    num++;

    if(types[i] === "yomi"){
      return `<span class="p-num">${num}</span>${t.surface_form}`;
    } else {
      return `<span class="p-num">${num}</span>${toHiragana(t.reading)}`;
    }
  }).join("");

  const answersHtml = Object.keys(types).map((i,idx)=>{
    const t = tokens[i];
    const type = types[i];

    return `<div>
      ${idx+1}.
      ${type==="yomi"
        ? `${t.surface_form} → ${answers[i]}`
        : `${toHiragana(t.reading)} → ${answers[i]}`
      }
    </div>`;
  }).join("");

  el.innerHTML = `
    <h3>問題</h3>
    <div style="font-size:18px;line-height:2">${text}</div>

    <h3 style="margin-top:20px">解答</h3>
    ${answersHtml}
  `;
}

</script>

</body>
</html>
